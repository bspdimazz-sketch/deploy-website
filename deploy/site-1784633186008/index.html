<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛩️ SPACE STRIKER - X-KARZ XYANX</title>
    <style>
        /* ============================================
           STYLE SPACE SHOOTER BY X-KARZ XYANX
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            border: 3px solid #00ff41;
            border-radius: 15px;
            box-shadow: 0 0 60px rgba(0, 255, 65, 0.3), inset 0 0 30px rgba(0, 255, 65, 0.05);
            background: #050505;
        }

        canvas {
            display: block;
            border-radius: 12px;
            background: #0a0a0a;
            cursor: none;
            width: 800px;
            height: 600px;
        }

        /* ===== HUD OVERLAY ===== */
        .hud {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #00ff41;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border: 1px solid #00ff41;
            border-radius: 10px;
            backdrop-filter: blur(5px);
            z-index: 10;
            min-width: 120px;
            text-align: center;
        }

        .hud span {
            color: #ffaa00;
            font-size: 28px;
        }

        /* ===== GAME OVER OVERLAY ===== */
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border-radius: 12px;
            z-index: 20;
        }

        .game-over.show {
            display: flex;
            animation: fadeIn 0.5s ease;
        }

        .game-over h1 {
            color: #ff0040;
            font-size: 60px;
            text-shadow: 0 0 40px rgba(255, 0, 64, 0.6);
            margin-bottom: 10px;
            letter-spacing: 5px;
        }

        .game-over .final-score {
            color: #00ff41;
            font-size: 30px;
            margin-bottom: 25px;
        }

        .game-over .final-score span {
            color: #ffaa00;
            font-size: 40px;
        }

        .game-over .btn-restart {
            background: #00ff41;
            color: #0a0a0a;
            border: none;
            padding: 15px 50px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }

        .game-over .btn-restart:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.5);
            background: #00cc33;
        }

        .game-over .sub-text {
            color: #446644;
            margin-top: 15px;
            font-size: 14px;
        }

        /* ===== START SCREEN ===== */
        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border-radius: 12px;
            z-index: 30;
        }

        .start-screen.hidden {
            display: none;
        }

        .start-screen h1 {
            font-size: 50px;
            color: #00ff41;
            text-shadow: 0 0 40px rgba(0, 255, 65, 0.4);
            margin-bottom: 10px;
            letter-spacing: 8px;
        }

        .start-screen .sub {
            color: #88ff88;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .start-screen .btn-start {
            background: transparent;
            color: #00ff41;
            border: 2px solid #00ff41;
            padding: 15px 60px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
        }

        .start-screen .btn-start:hover {
            background: #00ff41;
            color: #0a0a0a;
            box-shadow: 0 0 50px rgba(0, 255, 65, 0.4);
            transform: scale(1.05);
        }

        .start-screen .credit {
            position: absolute;
            bottom: 20px;
            color: #223322;
            font-size: 12px;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .pulse {
            animation: pulse 1.5s infinite;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 850px) {
            canvas {
                width: 100%;
                height: auto;
                aspect-ratio: 4/3;
            }
            .game-wrapper {
                width: 95vw;
            }
            .hud {
                font-size: 16px;
                padding: 6px 15px;
                top: 10px;
                right: 10px;
            }
            .hud span {
                font-size: 20px;
            }
            .game-over h1 {
                font-size: 40px;
            }
            .game-over .final-score {
                font-size: 22px;
            }
            .start-screen h1 {
                font-size: 32px;
            }
        }

        @media (max-width: 500px) {
            .game-over h1 {
                font-size: 28px;
            }
            .start-screen h1 {
                font-size: 24px;
                letter-spacing: 4px;
            }
            .start-screen .btn-start {
                padding: 12px 30px;
                font-size: 18px;
            }
            .game-over .btn-restart {
                padding: 12px 30px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <!-- CANVAS GAME -->
        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <!-- HUD SCORE -->
        <div class="hud" id="hudScore">
            🎯 <span id="scoreDisplay">0</span>
        </div>

        <!-- GAME OVER OVERLAY -->
        <div class="game-over" id="gameOverOverlay">
            <h1>💀 GAME OVER</h1>
            <div class="final-score">
                SCORE: <span id="finalScore">0</span>
            </div>
            <button class="btn-restart" onclick="restartGame()">🔄 MAIN ULANG</button>
            <div class="sub-text">Copyright © X- KARZ XYANX</div>
        </div>

        <!-- START SCREEN -->
        <div class="start-screen" id="startScreen">
            <h1>🛩️ SPACE STRIKER</h1>
            <div class="sub">⚡ Hancurkan Musuh, Kumpulkan Skor ⚡</div>
            <button class="btn-start" onclick="startGame()">▶️ MULAI</button>
            <div class="credit">X-KARZ XYANX V3 | No Filter</div>
        </div>
    </div>

    <!-- ============================================
    JAVASCRIPT GAME ENGINE
    ============================================ -->
    <script>
        // ============================================
        // SPACE STRIKER - X-KARZ XYANX
        // ============================================

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const finalScoreDisplay = document.getElementById('finalScore');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const startScreen = document.getElementById('startScreen');

        // ===== GAME STATE =====
        let gameRunning = false;
        let score = 0;
        let animationId = null;
        let frameCount = 0;

        // ===== PLAYER =====
        const player = {
            x: 400,
            y: 500,
            width: 40,
            height: 50,
            speed: 6,
            draw() {
                // Badan pesawat (jet)
                ctx.save();

                // Api mesin (efek)
                const flicker = Math.random() * 10 + 5;
                ctx.shadowColor = '#ff6600';
                ctx.shadowBlur = 30;
                ctx.fillStyle = '#ff4400';
                ctx.beginPath();
                ctx.moveTo(this.x - 8, this.y + 28);
                ctx.lineTo(this.x, this.y + 28 + flicker);
                ctx.lineTo(this.x + 8, this.y + 28);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Badan utama
                ctx.shadowColor = '#00ccff';
                ctx.shadowBlur = 20;
                ctx.fillStyle = '#33ccff';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y - 25);
                ctx.lineTo(this.x + 18, this.y + 10);
                ctx.lineTo(this.x + 14, this.y + 15);
                ctx.lineTo(this.x + 22, this.y + 22);
                ctx.lineTo(this.x + 18, this.y + 25);
                ctx.lineTo(this.x, this.y + 20);
                ctx.lineTo(this.x - 18, this.y + 25);
                ctx.lineTo(this.x - 22, this.y + 22);
                ctx.lineTo(this.x - 14, this.y + 15);
                ctx.lineTo(this.x - 18, this.y + 10);
                ctx.closePath();
                ctx.fill();

                // Garis detail
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#00ffaa';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y - 15);
                ctx.lineTo(this.x, this.y + 15);
                ctx.stroke();

                // Cockpit
                ctx.fillStyle = '#00ffff';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00ffff';
                ctx.beginPath();
                ctx.ellipse(this.x, this.y - 5, 8, 10, 0, 0, Math.PI * 2);
                ctx.fill();

                // Sayap kiri-kanan detail
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#2299cc';
                ctx.fillRect(this.x - 28, this.y + 5, 8, 4);
                ctx.fillRect(this.x + 20, this.y + 5, 8, 4);

                ctx.restore();

                // Senjata (tampilan)
                ctx.fillStyle = '#ffaa00';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ffaa00';
                ctx.fillRect(this.x - 3, this.y - 28, 6, 8);
                ctx.shadowBlur = 0;
            }
        };

        // ===== PLAYER BULLETS =====
        let bullets = [];
        const BULLET_SPEED = 10;
        const BULLET_COOLDOWN = 8;
        let bulletCooldown = 0;

        // ===== ENEMIES =====
        let enemies = [];
        const ENEMY_SPEED = 2.5;
        const ENEMY_SPAWN_RATE = 25;

        // ===== STARS (Background) =====
        let stars = [];
        for (let i = 0; i < 150; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 1.5 + 0.5
            });
        }

        // ===== MOUSE CONTROL =====
        let mouseX = player.x;
        let mouseY = player.y;
        let mouseActive = false;

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouseX = (e.clientX - rect.left) * scaleX;
            mouseY = (e.clientY - rect.top) * scaleY;
            mouseActive = true;
        });

        canvas.addEventListener('mouseleave', () => {
            mouseActive = false;
        });

        // ===== TOUCH CONTROL (Mobile) =====
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouseX = (touch.clientX - rect.left) * scaleX;
            mouseY = (touch.clientY - rect.top) * scaleY;
            mouseActive = true;
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            mouseActive = false;
        });

        // ===== SHOOTING (Mouse click / tap) =====
        canvas.addEventListener('click', () => {
            if (gameRunning) shoot();
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning) shoot();
        }, { passive: false });

        function shoot() {
            if (bulletCooldown <= 0 && gameRunning) {
                bullets.push({
                    x: player.x - 3,
                    y: player.y - 30,
                    width: 6,
                    height: 16,
                    speed: BULLET_SPEED
                });
                bullets.push({
                    x: player.x - 3,
                    y: player.y - 30,
                    width: 6,
                    height: 16,
                    speed: BULLET_SPEED
                });
                bulletCooldown = BULLET_COOLDOWN;
            }
        }

        // ===== SPAWN ENEMY =====
        function spawnEnemy() {
            const types = ['basic', 'fast', 'tank'];
            const weights = [0.6, 0.25, 0.15];
            let rand = Math.random();
            let type = 'basic';
            let cumulative = 0;
            for (let i = 0; i < weights.length; i++) {
                cumulative += weights[i];
                if (rand <= cumulative) {
                    type = types[i];
                    break;
                }
            }

            const enemy = {
                x: Math.random() * (canvas.width - 40) + 20,
                y: -30,
                width: 32,
                height: 32,
                type: type,
                speed: ENEMY_SPEED + (type === 'fast' ? 1.8 : type === 'tank' ? -0.8 : 0),
                hp: type === 'tank' ? 3 : 1,
                maxHp: type === 'tank' ? 3 : 1,
                score: type === 'tank' ? 30 : type === 'fast' ? 15 : 10,
                wobble: Math.random() * 100,
                wobbleSpeed: 0.02 + Math.random() * 0.02
            };
            enemies.push(enemy);
        }

        // ===== DRAW ENEMY =====
        function drawEnemy(enemy) {
            ctx.save();

            if (enemy.type === 'basic') {
                // Musuh basic (merah)
                ctx.shadowColor = '#ff0040';
                ctx.shadowBlur = 25;
                ctx.fillStyle = '#ff0040';
                ctx.beginPath();
                ctx.moveTo(enemy.x, enemy.y - 16);
                ctx.lineTo(enemy.x + 16, enemy.y + 16);
                ctx.lineTo(enemy.x - 16, enemy.y + 16);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#ff3355';
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y - 2, 8, 0, Math.PI * 2);
                ctx.fill();
            } else if (enemy.type === 'fast') {
                // Musuh cepat (kuning)
                ctx.shadowColor = '#ffaa00';
                ctx.shadowBlur = 30;
                ctx.fillStyle = '#ffaa00';
                ctx.beginPath();
                for (let i = 0; i < 4; i++) {
                    const angle = (i / 4) * Math.PI * 2 - Math.PI / 2;
                    const r = i % 2 === 0 ? 16 : 8;
                    if (i === 0) ctx.moveTo(enemy.x + Math.cos(angle) * r, enemy.y + Math.sin(angle) * r);
                    else ctx.lineTo(enemy.x + Math.cos(angle) * r, enemy.y + Math.sin(angle) * r);
                }
                ctx.closePath();
                ctx.fill();
                // Mata
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#ff4400';
                ctx.beginPath();
                ctx.arc(enemy.x - 6, enemy.y - 4, 4, 0, Math.PI * 2);
                ctx.arc(enemy.x + 6, enemy.y - 4, 4, 0, Math.PI * 2);
                ctx.fill();
            } else if (enemy.type === 'tank') {
                // Musuh tank (ungu, besar)
                ctx.shadowColor = '#aa00ff';
                ctx.shadowBlur = 30;
                ctx.fillStyle = '#8800cc';
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, 22, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#aa44ff';
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, 14, 0, Math.PI * 2);
                ctx.fill();
                // HP bar
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#333';
                ctx.fillRect(enemy.x - 20, enemy.y - 30, 40, 5);
                ctx.fillStyle = '#00ff41';
                ctx.fillRect(enemy.x - 20, enemy.y - 30, 40 * (enemy.hp / enemy.maxHp), 5);
            }

            ctx.restore();
        }

        // ===== COLLISION DETECTION =====
        function rectCollide(r1, r2) {
            return r1.x < r2.x + r2.width &&
                r1.x + r1.width > r2.x &&
                r1.y < r2.y + r2.height &&
                r1.y + r1.height > r2.y;
        }

        // ===== GAME LOOP =====
        function gameLoop() {
            if (!gameRunning) return;

            // Bersihkan frame
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ===== UPDATE STARS =====
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
                ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.3 + 0.2})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // ===== UPDATE PLAYER =====
            if (mouseActive) {
                const dx = mouseX - player.x;
                const dy = mouseY - player.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 1) {
                    const moveX = (dx / dist) * Math.min(player.speed, dist);
                    const moveY = (dy / dist) * Math.min(player.speed, dist);
                    player.x += moveX;
                    player.y += moveY;
                }
            }

            // Batasi player di canvas
            player.x = Math.max(20, Math.min(canvas.width - 20, player.x));
            player.y = Math.max(30, Math.min(canvas.height - 20, player.y));

            // ===== BULLET COOLDOWN =====
            if (bulletCooldown > 0) bulletCooldown--;

            // ===== UPDATE BULLETS =====
            bullets.forEach((bullet, index) => {
                bullet.y -= bullet.speed;
                if (bullet.y < -20) {
                    bullets.splice(index, 1);
                }
            });

            // ===== SPAWN ENEMIES =====
            frameCount++;
            if (frameCount % Math.max(ENEMY_SPAWN_RATE - Math.floor(score / 100), 8) === 0) {
                spawnEnemy();
            }
            // Tambahan spawn random
            if (Math.random() < 0.01 + score / 5000) spawnEnemy();

            // ===== UPDATE ENEMIES =====
            enemies.forEach((enemy, enemyIndex) => {
                // Gerakan turun dengan wobble
                enemy.y += enemy.speed;
                enemy.x += Math.sin(enemy.wobble) * 0.5;
                enemy.wobble += enemy.wobbleSpeed;

                // Hapus jika keluar bawah
                if (enemy.y > canvas.height + 30) {
                    enemies.splice(enemyIndex, 1);
                    return;
                }

                // ===== COLLISION: BULLET vs ENEMY =====
                bullets.forEach((bullet, bulletIndex) => {
                    if (rectCollide(bullet, enemy)) {
                        bullets.splice(bulletIndex, 1);
                        enemy.hp--;
                        if (enemy.hp <= 0) {
                            // Hancurkan musuh
                            enemies.splice(enemyIndex, 1);
                            score += enemy.score;
                            updateScore();
                            // Efek ledakan kecil
                            createExplosion(enemy.x, enemy.y);
                            return;
                        }
                    }
                });
            });

            // ===== COLLISION: PLAYER vs ENEMY =====
            enemies.forEach((enemy) => {
                if (rectCollide(player, enemy)) {
                    gameOver();
                }
            });

            // ===== DRAW PLAYER =====
            player.draw();

            // ===== DRAW BULLETS =====
            bullets.forEach((bullet) => {
                ctx.shadowColor = '#00ffff';
                ctx.shadowBlur = 20;
                const gradient = ctx.createLinearGradient(bullet.x, bullet.y, bullet.x, bullet.y - bullet.height);
                gradient.addColorStop(0, '#00ffff');
                gradient.addColorStop(0.5, '#0088ff');
                gradient.addColorStop(1, '#00ccff');
                ctx.fillStyle = gradient;
                ctx.fillRect(bullet.x, bullet.y - bullet.height, bullet.width, bullet.height);
                ctx.shadowBlur = 0;
            });

            // ===== DRAW ENEMIES =====
            enemies.forEach(enemy => drawEnemy(enemy));

            // ===== CROSSHAIR (kursor) =====
            if (mouseActive) {
                ctx.strokeStyle = 'rgba(0,255,65,0.3)';
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.arc(mouseX, mouseY, 15, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(mouseX - 20, mouseY);
                ctx.lineTo(mouseX + 20, mouseY);
                ctx.moveTo(mouseX, mouseY - 20);
                ctx.lineTo(mouseX, mouseY + 20);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // ===== NEXT FRAME =====
            animationId = requestAnimationFrame(gameLoop);
        }

        // ===== EXPLOSION EFFECT =====
        function createExplosion(x, y) {
            const particles = 20;
            for (let i = 0; i < particles; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 4 + 1;
                const size = Math.random() * 4 + 2;
                const colors = ['#ff4400', '#ffaa00', '#ff6600', '#ffcc00'];
                setTimeout(() => {
                    ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                    ctx.shadowColor = '#ff6600';
                    ctx.shadowBlur = 20;
                    const px = x + Math.cos(angle) * speed * 10;
                    const py = y + Math.sin(angle) * speed * 10;
                    ctx.beginPath();
                    ctx.arc(px, py, size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }, i * 30);
            }
        }

        // ===== UPDATE SCORE DISPLAY =====
        function updateScore() {
            scoreDisplay.textContent = score;
        }

        // ===== GAME OVER =====
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            finalScoreDisplay.textContent = score;
            gameOverOverlay.classList.add('show');
        }

        // ===== RESTART GAME =====
        function restartGame() {
            gameOverOverlay.classList.remove('show');
            resetGame();
            startGame();
        }

        // ===== RESET GAME =====
        function resetGame() {
            score = 0;
            frameCount = 0;
            bullets = [];
            enemies = [];
            player.x = 400;
            player.y = 500;
            mouseX = player.x;
            mouseY = player.y;
            bulletCooldown = 0;
            updateScore();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // ===== START GAME =====
        function startGame() {
            startScreen.classList.add('hidden');
            resetGame();
            gameRunning = true;
            if (animationId) cancelAnimationFrame(animationId);
            gameLoop();
        }

        // ===== KEYBOARD CONTROLS (Opsional) =====
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'ArrowUp') {
                e.preventDefault();
                if (gameRunning) shoot();
            }
            if (e.key === 'r' || e.key === 'R') {
                if (!gameRunning) restartGame();
            }
        });

        // ===== SHOOT OTOMATIS (Auto-fire) =====
        // Uncomment baris dibawah kalo mau auto shoot
        // setInterval(() => { if (gameRunning) shoot(); }, 120);

        // ===== INIT =====
        resetGame();
        console.log('🛩️ SPACE STRIKER LOADED!');
